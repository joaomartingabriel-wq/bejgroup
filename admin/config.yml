backend:
  name: github
  repo: joaomartingabriel-wq/bejgroup
  branch: main
  base_url: https://bejgroup-auth.joaomartin-gabriel.workers.dev
  auth_endpoint: /auth

# Mídia
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Interface em português
locale: pt

# Publicação manual
publish_mode: editorial_workflow

collections:

  # ─── DADOS GERAIS DA EMPRESA ───────────────────────────
  - name: "empresa"
    label: "Empresa"
    files:
      - name: "dados"
        label: "Dados Gerais da Empresa"
        file: "_data/site.json"
        fields:

          # EMPRESA
          - label: "Informações da Empresa"
            name: "empresa"
            widget: "object"
            fields:
              - { label: "Nome",              name: "nome",            widget: "string" }
              - { label: "Slogan",            name: "slogan",          widget: "string" }
              - { label: "Cidade",            name: "cidade",          widget: "string" }
              - { label: "Estado",            name: "estado",          widget: "string" }
              - { label: "Telefone",          name: "telefone",        widget: "string" }
              - { label: "WhatsApp (só números, ex: 5551999998888)", name: "whatsapp", widget: "string" }
              - { label: "E-mail",            name: "email",           widget: "string" }
              - { label: "Horário semana",    name: "horario_semana",  widget: "string" }
              - { label: "Horário sábado",    name: "horario_sabado",  widget: "string" }
              - { label: "Ano de fundação",   name: "fundacao",        widget: "string" }

          # HERO
          - label: "Seção Hero (Topo)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Linha de destaque",     name: "label",        widget: "string" }
              - { label: "Título linha 1",         name: "titulo_linha1", widget: "string" }
              - { label: "Título linha 2",         name: "titulo_linha2", widget: "string" }
              - { label: "Título dourado 1",       name: "titulo_gold1",  widget: "string" }
              - { label: "Título dourado 2",       name: "titulo_gold2",  widget: "string" }
              - { label: "Título menor",           name: "titulo_dim",    widget: "string" }
              - { label: "Subtítulo",              name: "subtitulo",     widget: "text" }

          # MÉTRICAS
          - label: "Métricas (números)"
            name: "metricas"
            widget: "object"
            fields:
              - { label: "Anos de experiência",  name: "anos",       widget: "string" }
              - { label: "Projetos entregues",   name: "projetos",   widget: "string" }
              - { label: "Clientes atendidos",   name: "clientes",   widget: "string" }
              - { label: "Empresas parceiras",   name: "parceiros",  widget: "string" }
              - { label: "Satisfação (%)",        name: "satisfacao", widget: "string" }

          # SOBRE
          - label: "Seção Sobre"
            name: "sobre"
            widget: "object"
            fields:
              - { label: "Título",   name: "titulo",  widget: "string" }
              - { label: "Parágrafo 1", name: "texto1", widget: "text" }
              - { label: "Parágrafo 2", name: "texto2", widget: "text" }
              - { label: "Citação em destaque", name: "citacao", widget: "text" }

          # SERVIÇOS
          - label: "Serviços"
            name: "servicos"
            widget: "list"
            fields:
              - { label: "Número (ex: 01)", name: "numero",    widget: "string" }
              - { label: "Título",           name: "titulo",    widget: "string" }
              - { label: "Descrição",        name: "descricao", widget: "text" }
              - label: "Itens da lista"
                name: "itens"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }

          # PARCEIROS
          - label: "Empresas Parceiras"
            name: "parceiros"
            widget: "list"
            field: { label: "Nome da empresa", name: "nome", widget: "string" }

          # DEPOIMENTOS
          - label: "Depoimentos"
            name: "depoimentos"
            widget: "list"
            fields:
              - { label: "Depoimento",    name: "texto",    widget: "text" }
              - { label: "Nome",          name: "nome",     widget: "string" }
              - { label: "Cargo/Empresa", name: "cargo",    widget: "string" }
              - { label: "Iniciais (ex: MS)", name: "iniciais", widget: "string", pattern: ['.{1,2}', "Máximo 2 letras"] }

          # PROCESSO
          - label: "Etapas do Processo"
            name: "processo"
            widget: "list"
            fields:
              - { label: "Título da etapa", name: "titulo", widget: "string" }
              - { label: "Descrição",       name: "texto",  widget: "text" }

          # EDITORIAL
          - label: "Seção Editorial"
            name: "editorial"
            widget: "object"
            fields:
              - { label: "Título",   name: "titulo", widget: "string" }
              - { label: "Texto",    name: "texto",  widget: "text" }
              - label: "Livros na estante"
                name: "livros"
                widget: "list"
                fields:
                  - { label: "Categoria", name: "categoria", widget: "string" }
                  - { label: "Título do livro", name: "titulo", widget: "string" }

          # RESPONSABILIDADE SOCIAL
          - label: "Responsabilidade Social"
            name: "responsabilidade"
            widget: "list"
            fields:
              - { label: "Título da ação", name: "titulo", widget: "string" }
              - { label: "Descrição",       name: "texto",  widget: "text" }
              - { label: "Tag (ex: Educação)", name: "tag", widget: "string" }

          # FAQ
          - label: "Perguntas Frequentes (FAQ)"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Pergunta", name: "pergunta", widget: "string" }
              - { label: "Resposta", name: "resposta", widget: "text" }
